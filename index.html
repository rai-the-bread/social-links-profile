<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <title>Rai the Bread | Social links profile</title>
</head>

<body class="flex flex-col flex-center justify-evenly text-2">
  <main class="container flex flex-col">
    <header class="flex flex-col flex-center">
      <figure class="flex flex-col flex-center">
        <img class="headshot" src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall headshot">
        <figcaption class="gap-50 flex flex-col">
          <h1 class="text-1">Jessica Randall</h1>
          <p class="green-text text-3">London, United Kingdom</p>
        </figcaption>
      </figure>
      <p class="text-2"><q>"Front-end developer and avid reader."</q></p>
    </header>
    <nav>
      <ul class="gap-200 flex flex-col">
        <li><a href="#" class="button text-3">GitHub</a></li>
        <li><a href="#" class="button text-3">Frontend Mentor</a></li>
        <li><a href="#" class="button text-3">LinkedIn</a></li>
        <li><a href="#" class="button text-3">Twitter</a></li>
        <li><a href="#" class="button text-3">Instagram</a></li>
      </ul>
    </nav>
  </main>
  <footer class="attribution">
    <p class="text-4">Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">
        Frontend Mentor
      </a>.
      Coded by
      <a href="https://rai-dorzback.netlify.app/" target="_blank" rel="noopener noreferrer"
        aria-label="Rai the Bread personal site (opens in a new tab)">
        Rai the Bread
      </a>.
    </p>
  </footer>
</body>

</html>
